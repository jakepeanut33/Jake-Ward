name: Post Core Boys Short

# Runs 3x/day. Cron is in UTC. These are roughly 9am / 3pm / 8pm US Central.
# Adjust the times to hit your audience's peak hours.
on:
  schedule:
    - cron: "0 14 * * *"   # ~09:00 America/Chicago
    - cron: "0 20 * * *"   # ~15:00 America/Chicago
    - cron: "0 1 * * *"    # ~20:00 America/Chicago (previous day UTC)
  workflow_dispatch: {}     # lets you trigger a post manually from the Actions tab

# Allow the job to push the updated queue back to the repo.
permissions:
  contents: write

# Never run two uploads at once.
concurrency:
  group: post-shorts
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Post one Short
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python -m src.pipeline

      - name: Commit queue state
        run: |
          if [[ -n "$(git status --porcelain data/queue.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/queue.json
            git commit -m "chore: update queue after posting [skip ci]"
            git push
          else
            echo "No queue changes to commit."
          fi
