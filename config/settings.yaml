# ---------------------------------------------------------------------------
# Channel + content configuration (non-secret). Safe to commit.
# Secrets (OAuth client id/secret, refresh token) come from env vars instead.
# ---------------------------------------------------------------------------

channel:
  # Used to build the uploaded video's title/description/tags.
  name: "Core Boys Funny Clips"
  # Appended to every description. Keep #Shorts so YouTube classifies it correctly.
  hashtags:
    - "#Shorts"
    - "#funny"
    - "#coreboys"
    - "#comedy"
  # Default privacy for uploads: "public", "unlisted", or "private".
  privacy_status: "public"
  # YouTube category id. 23 = Comedy, 24 = Entertainment.
  category_id: "23"
  # Mark uploads as not-made-for-kids by default (required field for the API).
  made_for_kids: false

formatting:
  # Target Shorts resolution (vertical 9:16).
  width: 1080
  height: 1920
  # Hard cap on clip length. Shorts must be <= 60s; we keep margin.
  max_seconds: 58
  # Background style for non-vertical source footage:
  #   "blur"  -> blurred zoomed copy behind the centered clip (recommended)
  #   "crop"  -> center-crop the source to 9:16 (zooms in, may cut edges)
  #   "pad"   -> black bars top/bottom
  background: "blur"
  # Burn a caption onto the top of the video (uses the clip's "caption" field).
  burn_caption: true

# ---------------------------------------------------------------------------
# Discovery: automatically find top-performing videos and queue clips of them.
# Requires a YouTube Data API key in the YT_API_KEY env var / GitHub secret.
# When enabled and the queue is empty, the pipeline fills it from these results.
# ---------------------------------------------------------------------------
# HEADS UP: auto-clipping other people's top videos is the most copyright-risky
# way to run this. Use creators who allow reuse, or add real transformation, or
# you risk Content-ID claims and channel termination.
discovery:
  enabled: false
  # "search"   -> find the most-viewed videos for your keywords (best for a niche)
  # "trending" -> the regional "most popular" chart (broad, generic)
  mode: "search"
  keywords:
    - "core boys funny"
    - "funny moments"
  region: "US"
  # Used only in "trending" mode. 23 = Comedy, 24 = Entertainment.
  category_id: "23"
  # How many results to pull per keyword / from the chart (max 50).
  max_results: 15
  # Skip videos below this view count (quality/relevance floor).
  min_views: 200000
  # "search" mode only: only consider videos published within N days (0 = any).
  published_within_days: 0
  # Skip very long sources so downloads stay cheap (0 = no limit).
  max_source_duration_seconds: 1800
  # Auto-clip window: start this many seconds in (skips intros), this long.
  clip_offset_seconds: 30
  clip_length_seconds: 50

# Optional auto-sourcing: pull the latest uploads from these channels and add
# them as candidate clips to the queue. Leave empty to rely only on the manual
# queue in data/queue.json. Each entry is a channel URL or @handle.
auto_source:
  enabled: false
  channels:
    # - "https://www.youtube.com/@SomeCoreBoysChannel"
  # How many of the most recent uploads to consider per run.
  videos_per_channel: 5
  # When auto-clipping, take this many seconds starting at this offset.
  clip_offset_seconds: 0
  clip_length_seconds: 50
